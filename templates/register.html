<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Missing Person</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet"
        href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<nav class="navbar navbar-expand-lg">
    <div class="container">
        <a class="navbar-brand text-white fw-bold fs-3" href="/">
            🛡 AI Missing Person Detection System
        </a>
    </div>
</nav>

<div class="container mt-5">

<div class="row align-items-center">

    <!-- Left Side -->
    <div class="col-lg-6 text-center">

        <h1 class="text-white mt-4">
            Register Missing Person
        </h1>

        <p class="text-white fs-5">
            Enter the missing person's details and upload a clear photo.
            The information will be securely stored in the database for
            future identification and searching.
        </p>

    </div>

    <!-- Right Side -->
    <div class="col-lg-6">

        <div class="main-card">

            <h2 class="text-center mb-4">
                <i class="bi bi-person-plus-fill"></i>
                Register
            </h2>

            <form action="/register" method="POST" enctype="multipart/form-data">

                <div class="mb-3">
                    <label class="form-label">Name</label>

                    <input type="text"
                           name="name"
                           class="form-control"
                           required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Age</label>

                    <input type="number"
                           name="age"
                           class="form-control"
                           required>
                </div>

                <div class="mb-4">
                    <label class="form-label">Upload Photo</label>

                    <input type="file"
                           name="photo"
                           class="form-control"
                           accept="image/*"
                           required>
                </div>

                <button class="btn btn-primary btn-lg w-100">

                    <i class="bi bi-cloud-upload-fill"></i>

                    Register Person

                </button>

            </form>

            <a href="/"
               class="btn btn-secondary btn-lg w-100 mt-3">

               <i class="bi bi-house-fill"></i>

               Back to Home

            </a>

        </div>

    </div>

</div>

</div>

</body>

</html>
